    var r=rows[i];if(!r||r.length<5)continue;
    var obj={};for(var j=0;j<hdr.length;j++)obj[hdr[j]]=r[j]||'';
    if(!obj.Name||!obj.Market)continue;
    var skip=false;for(var k=0;k<meta.length;k++)if(obj.Group===meta[k]){skip=true;break}
    if(skip)continue;
    var cpLink=obj['Campaygn Public Link']||'',cpM=cpLink.match(/\/(\d+)(?:\?|$)/),cpId=cpM?cpM[1]:'';
    var plRaw=(obj['Main Platform Link (CH)']||''),plUrl=plRaw.split(' - ').pop().trim();

    var tkM=plUrl.match(/tiktok\.com\/@?([^\/?]+)/i),tku=tkM?tkM[1]:'';
    out.push({Name:obj.Name,Market:obj.Market,Campaign:obj.Campaign||'',Tier:obj.Tier||'',Segment:obj.Segment||'',Status:obj.Status||'',TravelDates:obj['Travel Dates']||'',Platform:obj['Primary Platform']||'',Followers:obj['Total followers']||'',Cost:obj['Talent Cost']||'',ProvCost:obj['Provision Travel cost']||'',EMV:obj['Forecasted EMV $']||'',Cred:obj['% real followers']||'',CampaygnId:cpId,IGUser:igu,TKUser:tku,ProfileLink:plUrl,ER:obj['ER %']||'',MR:obj['Market reach %']||'',SheetROAS:obj['ROAS']||''});

}

/* JSONP fetch - bypasses CORS via script tag injection (same as reference dashboard) */
function fetchJSONP(){
  return new Promise(function(res,rej){
    var cb='_gc'+Date.now();
    var to=setTimeout(function(){delete window[cb];var el=document.getElementById('gs');if(el)el.remove();rej('timeout')},8000);
    window[cb]=function(resp){
      clearTimeout(to);delete window[cb];var el=document.getElementById('gs');if(el)el.remove();
      try{
        if(resp&&resp.table){
          var cols=resp.table.cols,rows=resp.table.rows,c={};
          for(var i=0;i<cols.length;i++){
            var lb=(cols[i].label||'').trim();
            if(lb==='Name')c.n=i;else if(lb==='Market')c.m=i;else if(lb==='Campaign')c.c=i;else if(lb==='Tier')c.t=i;
            else if(lb==='Segment')c.sg=i;else if(lb==='Status')c.s=i;else if(lb==='Travel Dates')c.td=i;
            else if(lb==='Primary Platform')c.pp=i;else if(lb==='Total followers')c.f=i;else if(lb==='Talent Cost')c.tc=i;
            else if(lb==='Forecasted EMV $')c.emv=i;else if(lb==='% real followers')c.cr=i;else if(lb==='Provision Travel cost')c.ptc=i;else if(lb==='ER %')c.er=i;else if(lb==='Market reach %')c.mr=i;else if(lb==='ROAS (Numbers)')c.sr=i;else if(lb==='Provision Travel Cost $(Number)')c.spc=i;
            else if(lb==='Campaygn Public Link')c.cp=i;else if(lb==='Main Platform Link (CH)')c.pl=i;
          }
          var gv=function(row,idx){if(idx===undefined||!row.c||!row.c[idx])return'';var cl=row.c[idx];return cl.f||(cl.v!=null?String(cl.v):'')};
          var data=[];
          for(var i=0;i<rows.length;i++){
            var nm=gv(rows[i],c.n).trim();if(!nm)continue;
            var mk=c.m!==undefined?gv(rows[i],c.m).trim():'';if(!mk)continue;
            var cpRaw=c.cp!==undefined?gv(rows[i],c.cp):'';
            var cpM=cpRaw.match(/\/(\d+)(?:\?|$)/);var cpId=cpM?cpM[1]:'';
            var plRaw=c.pl!==undefined?gv(rows[i],c.pl):'';
            var plUrl=plRaw.split(' - ').pop().trim();
            var igM=plUrl.match(/instagram\.com\/([^\/?]+)/i);var igu=igM?igM[1]:'';
            var tkM=plUrl.match(/tiktok\.com\/@?([^\/?]+)/i);var tku=tkM?tkM[1]:'';
            data.push({Name:nm,Market:mk,Campaign:c.c!==undefined?gv(rows[i],c.c).trim():'',
              Tier:c.t!==undefined?gv(rows[i],c.t).trim():'',Segment:c.sg!==undefined?gv(rows[i],c.sg).trim():'',
              Status:c.s!==undefined?gv(rows[i],c.s).trim():'',TravelDates:c.td!==undefined?gv(rows[i],c.td).trim():'',
              Platform:c.pp!==undefined?gv(rows[i],c.pp).trim():'',Followers:c.f!==undefined?gv(rows[i],c.f):'',
              Cost:c.tc!==undefined?gv(rows[i],c.tc):'',EMV:c.emv!==undefined?gv(rows[i],c.emv):'',
              Cred:c.cr!==undefined?gv(rows[i],c.cr):'',ProvCost:c.ptc!==undefined?gv(rows[i],c.ptc):'',
              ER:c.er!==undefined?gv(rows[i],c.er):'',MR:c.mr!==undefined?gv(rows[i],c.mr):'',
              SheetROAS:c.sr!==undefined?gv(rows[i],c.sr):'',SheetProvCost:c.spc!==undefined?gv(rows[i],c.spc):'',
              CampaygnId:cpId,IGUser:igu,TKUser:tku,ProfileLink:plUrl});
          }
          res(data.length>0?data:null);
        }else{res(null)}
      }catch(e){rej(e)}
    };
    var s=document.createElement('script');s.id='gs';
    s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=responseHandler:'+cb+'&gid='+GID;
    s.onerror=function(){clearTimeout(to);rej('script error')};
    document.body.appendChild(s);
  });
}

/* CSV fetch as fallback */
function fetchCSV(){
  return fetch(CSVURL+'&_t='+Date.now(),{redirect:'follow'})
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text()})
  .then(function(t){
    if(t.indexOf('Name')===-1)throw new Error('No Name header');
    return parseSheet(t);
  });
}

  document.getElementById('srcLabel').textContent='Live from Google Sheets';

  buildFilters();applyFilters();updateTime();

/* Load: JSONP first, CSV fallback, snapshot last resort */
function fetchLive(){
  if(SHEET_ID){
    fetchJSONP().then(function(data){
      if(data&&data.length>0){goLive(data);return}
      return fetchCSV().then(function(d2){if(d2&&d2.length>0)goLive(d2);});
    }).catch(function(){
      fetchCSV().then(function(d){if(d&&d.length>0)goLive(d);}).catch(function(){
        console.warn('All live methods failed, using snapshot');
        if(!D.length)loadSnapshot();
      });
    });
  }else{
    fetchCSV().then(function(d){if(d&&d.length>0)goLive(d);}).catch(function(){
      console.warn('CSV fetch failed, using snapshot');if(!D.length)loadSnapshot();
    });
  }
}

  var iconCache={};
  function renderIconPNG(key){
    return new Promise(function(res){
      if(!iconSVGs[key]){res(null);return}
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=48;c.height=48;
        var ctx=c.getContext('2d');ctx.drawImage(img,0,0,48,48);
        iconCache[key]=c.toDataURL('image/png');res(iconCache[key]);
      };
      img.onerror=function(){iconCache[key]=null;res(null)};
      img.src='data:image/svg+xml;charset=utf-8,'+iconSVGs[key];
    });
  }
  await Promise.all(Object.keys(iconSVGs).map(renderIconPNG));

  // Pre-render market flag emojis as circular PNGs
  var flagPngCache={};
  function renderFlagPNG(market){
    return new Promise(function(res){
      var emoji=flag(market);
      var sz=64;
      var c=document.createElement('canvas');c.width=sz;c.height=sz;
      var ctx=c.getContext('2d');
      // Dark circle background
      ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2,0,Math.PI*2);ctx.fillStyle='#1e2332';ctx.fill();
      ctx.strokeStyle='#252b3b';ctx.lineWidth=2;ctx.stroke();
      // Flag emoji centered
      ctx.font='30px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(emoji,sz/2,sz/2+2);
      flagPngCache[market]=c.toDataURL('image/png');
      res();
    });
  }
  var markets={};list.forEach(function(d){if(d.Market)markets[d.Market]=1});
  await Promise.all(Object.keys(markets).map(renderFlagPNG));

      if(!resp.ok)throw new Error('HTTP '+resp.status);
      var blob=await resp.blob();
      var b64=await new Promise(function(res){var r=new FileReader();r.onloadend=function(){res(r.result)};r.readAsDataURL(blob)});
      avatarCache[cpId]=b64;

  s2.background={color:BG};
  s2.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:'100%',h:0.04,fill:{color:AC}});
  s2.addText('Campaign Overview',{x:0.6,y:0.3,w:10,h:0.5,fontSize:22,fontFace:FN,bold:true,color:TX});
  s2.addText(campLabel,{x:0.6,y:0.75,w:10,h:0.3,fontSize:11,fontFace:FN,color:AC});

  // KPI cards row
  var kpis;
  if(mode==='costs'){
    kpis=[
      {label:'Total Influencers',value:list.length.toString(),color:AC},
      {label:'Visited',value:visited.toString(),color:GN},
      {label:'Contracted',value:contracted.toString(),color:BL},
      {label:'In Discussion',value:discussion.toString(),color:AM},
      {label:'Total Spend',value:fm(totalSpend),color:PU},
      {label:'Forecasted EMV',value:fm(totalEMV),color:GN},
      {label:'ROI',value:roasTotal,color:OR}
    ];
  }else{
    kpis=[
      {label:'Total Influencers',value:list.length.toString(),color:AC},
      {label:'Visited',value:visited.toString(),color:GN},
      {label:'Contracted',value:contracted.toString(),color:BL},
      {label:'In Discussion',value:discussion.toString(),color:AM},
      {label:'Forecasted EMV',value:fm(totalEMV),color:GN}
    ];
  }
  var kw=1.65,kgap=0.15,kStartX=(13.33-kpis.length*kw-(kpis.length-1)*kgap)/2;
  for(var ki=0;ki<kpis.length;ki++){
    var kx=kStartX+ki*(kw+kgap);
    s2.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:kx,y:1.35,w:kw,h:1.15,fill:{color:SF},line:{color:BD,width:0.75},rectRadius:0.08});
    s2.addShape(pptx.shapes.RECTANGLE,{x:kx,y:1.35,w:kw,h:0.04,fill:{color:kpis[ki].color}});
    s2.addText(kpis[ki].value,{x:kx,y:1.5,w:kw,h:0.55,fontSize:22,fontFace:FN,bold:true,color:kpis[ki].color,align:'center',valign:'middle'});
    s2.addText(kpis[ki].label,{x:kx,y:2.05,w:kw,h:0.35,fontSize:8,fontFace:FN,color:MUT,align:'center',valign:'middle'});
  }

  // Market breakdown
  var mkc={};list.forEach(function(d){mkc[d.Market||'?']=(mkc[d.Market||'?']||0)+1});
  var mke=Object.entries(mkc).sort(function(a,b){return b[1]-a[1]});
  s2.addText('Market Distribution',{x:0.6,y:2.85,w:5,h:0.35,fontSize:12,fontFace:FN,bold:true,color:TX});
  var mColW=2.0,mRows=Math.ceil(mke.length/6);
  for(var mi=0;mi<mke.length;mi++){
    var col=mi%6,row=Math.floor(mi/6);
    var mx=0.6+col*mColW,my=3.25+row*0.3;
    s2.addText(mke[mi][0]+': '+mke[mi][1],{x:mx,y:my,w:mColW,h:0.28,fontSize:9,fontFace:FN,color:DIM});
  }

  // Status breakdown
  var stc={};list.forEach(function(d){stc[d.Status||'Unknown']=(stc[d.Status||'Unknown']||0)+1});
  var ste=Object.entries(stc).sort(function(a,b){return b[1]-a[1]});
  var stY=3.25+mRows*0.3+0.3;
  s2.addText('Status Pipeline',{x:0.6,y:stY,w:5,h:0.35,fontSize:12,fontFace:FN,bold:true,color:TX});
  var stBarMax=ste.length?ste[0][1]:1;
  for(var si=0;si<Math.min(ste.length,8);si++){
    var sy=stY+0.4+si*0.3;
    s2.addText(ste[si][0],{x:0.6,y:sy,w:2.5,h:0.25,fontSize:9,fontFace:FN,color:DIM,align:'right',valign:'middle'});
    var barW=Math.max(0.3,ste[si][1]/stBarMax*8);
    s2.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:3.2,y:sy+0.02,w:barW,h:0.22,fill:{color:AC},rectRadius:0.05});
    s2.addText(ste[si][1].toString(),{x:3.2,y:sy,w:barW,h:0.25,fontSize:8,fontFace:FN,bold:true,color:BG,align:'center',valign:'middle'});
  }

  s2.addText('Generated '+dateStr+' | DCT Abu Dhabi SM&C',{x:0,y:7.0,w:'100%',h:0.3,fontSize:8,fontFace:FN,color:MUT,align:'center'});

  // ---- INFLUENCER CARDS (6 per slide, with avatar) ----
  var perSlide=6,cols=3,cardW=3.9,cardH=2.6,gapX=0.2,gapY=0.2;
  var startX=(13.33-cols*cardW-(cols-1)*gapX)/2;
  var totalPages=Math.ceil(list.length/perSlide);

  for(var pg=0;pg<totalPages;pg++){
    var sl=pptx.addSlide();
    sl.background={color:BG};
    sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:'100%',h:0.04,fill:{color:AC}});
    sl.addText(campLabel,{x:0.5,y:0.15,w:8,h:0.3,fontSize:9,fontFace:FN,color:AC});
    sl.addText((pg+1)+' / '+totalPages,{x:10.5,y:0.15,w:2.5,h:0.3,fontSize:9,fontFace:FN,color:MUT,align:'right'});

    var chunk=list.slice(pg*perSlide,(pg+1)*perSlide);
    for(var ci=0;ci<chunk.length;ci++){
      var d=chunk[ci];
      var col2=ci%cols,row2=Math.floor(ci/cols);
      var cx=startX+col2*(cardW+gapX);
      var cy=0.65+row2*(cardH+gapY);

      // Card background
      sl.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:cx,y:cy,w:cardW,h:cardH,fill:{color:SF},line:{color:BD,width:0.5},rectRadius:0.1});

      // Avatar - circle fallback first, image overlays on top
      var avSize=0.65;
      var avX=cx+0.2,avY=cy+0.25;
      sl.addShape(pptx.shapes.OVAL,{x:avX,y:avY,w:avSize,h:avSize,fill:{color:SF2},line:{color:BD,width:0.5}});
      sl.addText((d.Name||'?').charAt(0).toUpperCase(),{x:avX,y:avY,w:avSize,h:avSize,fontSize:16,fontFace:FN,bold:true,color:AC,align:'center',valign:'middle'});
      if(d.CampaygnId&&avatarCache[d.CampaygnId]){
        sl.addImage({data:avatarCache[d.CampaygnId],x:avX,y:avY,w:avSize,h:avSize,rounding:true});
      }

      // Market flag badge (top-right of avatar)
      var fbSize=0.25;
      var fbX=avX-0.05,fbY=avY-0.05;
      if(d.Market&&flagPngCache[d.Market]){
        sl.addImage({data:flagPngCache[d.Market],x:fbX,y:fbY,w:fbSize,h:fbSize,rounding:true});
      }else{
        sl.addShape(pptx.shapes.OVAL,{x:fbX,y:fbY,w:fbSize,h:fbSize,fill:{color:'2A3040'},line:{color:BD,width:0.5}});
        sl.addText((d.Market||'?').slice(0,2).toUpperCase(),{x:fbX,y:fbY,w:fbSize,h:fbSize,fontSize:5,fontFace:FN,bold:true,color:TX,align:'center',valign:'middle'});
      }

      // Name
      sl.addText(d.Name,{x:cx+1.0,y:cy+0.2,w:cardW-1.8,h:0.3,fontSize:13,fontFace:FN,bold:true,color:TX,valign:'middle',margin:0});

      // Status pill (under name)
      var stL=d.Status||'--';
      var stCol=stL.toLowerCase().indexOf('visited')>-1?GN:stL.toLowerCase().indexOf('contract')>-1?BL:stL.toLowerCase().indexOf('discussion')>-1?AM:stL.toLowerCase().indexOf('cancel')>-1?RD:stL.toLowerCase().indexOf('declined')>-1?RD:PU;
      var stW=stL.length*0.06+0.2;
      sl.addText(stL,{x:cx+1.0,y:cy+0.5,w:stW,h:0.2,fontSize:7,fontFace:FN,bold:true,color:stCol,align:'center',valign:'middle',margin:0,shape:pptx.shapes.ROUNDED_RECTANGLE,fill:{color:SF2},line:{color:stCol,width:0.5},rectRadius:0.07});

      // Social platform icons - positioned under Tier (top right)
      var socials=[];
      if(d.IGUser)socials.push({key:'IG',url:'https://instagram.com/'+d.IGUser,col:'E1306C'});
      if(d.TKUser)socials.push({key:'TK',url:'https://tiktok.com/@'+d.TKUser,col:TX});
      var pl2=(d.ProfileLink||'').toLowerCase(),pu2=d.ProfileLink||'';
      if(!d.IGUser&&!d.TKUser&&pu2){
        if(pl2.indexOf('youtube')>-1)socials.push({key:'YT',url:pu2,col:'FF0000'});
        else if(pl2.indexOf('douyin')>-1||pl2.indexOf('iesdouyin')>-1)socials.push({key:'DY',url:pu2,col:'00F2EA'});
        else if(pl2.indexOf('xiaohongshu')>-1)socials.push({key:'RED',url:pu2,col:'FF2442'});
        else if(pl2.indexOf('weibo')>-1)socials.push({key:'WB',url:pu2,col:'E6162D'});
        else if(pl2.indexOf('b23.tv')>-1||pl2.indexOf('bilibili')>-1)socials.push({key:'BL',url:pu2,col:'00A1D6'});
      }
      if((d.IGUser||d.TKUser)&&pu2&&pl2.indexOf('youtube')>-1)socials.push({key:'YT',url:pu2,col:'FF0000'});
      // Render icons under Tier
      for(var si3=0;si3<socials.length;si3++){
        var iconX=cx+cardW-0.15-(socials.length-si3)*0.32;
        var iconY=cy+0.48;
        var icoData=iconCache[socials[si3].key];
        if(icoData){
          sl.addImage({data:icoData,x:iconX+0.02,y:iconY+0.01,w:0.24,h:0.24,hyperlink:{url:socials[si3].url}});
        }else{
          sl.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:iconX,y:iconY,w:0.28,h:0.24,fill:{color:SF2},rectRadius:0.05});
          sl.addText([{text:socials[si3].key,options:{hyperlink:{url:socials[si3].url},fontSize:7,fontFace:FN,bold:true,color:socials[si3].col}}],{x:iconX,y:iconY,w:0.28,h:0.24,align:'center',valign:'middle'});
        }
      }

      // Stats grid (2 rows x 3 cols)
      var fol=pn(d.Followers);
      var cred=parseFloat(d.Cred)||0;
      var credCol=cred>=70?GN:cred>=50?AM:RD;
      var cost=pn(d.Cost)+getTravelCost(d),emv=pn(d.EMV);
      var roas=getROI(d);var roasX=roas!=='--'?roas+'x':'--';
      var roasCol=roas!=='--'?(parseFloat(roas)>=5?GN:parseFloat(roas)>=2?AM:RD):MUT;
      var travel=d.TravelDates||'--';
      if(travel!=='--'){var tp=travel.split(' - ');if(tp.length===2){var dd1=new Date(tp[0]),dd2=new Date(tp[1]);if(!isNaN(dd1)){var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];if(dd1.getTime()===dd2.getTime())travel=mos[dd1.getMonth()]+' '+dd1.getDate();else travel=mos[dd1.getMonth()]+' '+dd1.getDate()+' - '+mos[dd2.getMonth()]+' '+dd2.getDate()}}}

      var erVal=parseFloat(d.ER)||0;
      var mrVal=parseFloat(d.MR)||0;
      var stats;
      if(mode==='costs'){
        stats=[
          {l:'FOLLOWERS',v:fol?fn(fol):'--',c:TX,fs:12},
          {l:'CREDIBILITY',v:cred?Math.round(cred).toString():'--',c:credCol,fs:12},
          {l:'TALENT COST',v:fm(d.Cost),c:PU,fs:11},
          {l:'TRAVEL COST',v:fm(getTravelCost(d)),c:'8B5CF6',fs:11},
          {l:'EMV',v:fm(d.EMV),c:GN,fs:12},
          {l:'VISIT',v:travel==='--'?'--':travel,c:travel==='--'?MUT:'C084FC',fs:9}
        ];
      }else{
        stats=[
          {l:'FOLLOWERS',v:fol?fn(fol):'--',c:TX,fs:12},
          {l:'CREDIBILITY',v:cred?Math.round(cred).toString():'--',c:credCol,fs:12},
          {l:'MARKET REACH',v:mrVal?mrVal.toFixed(1)+'%':'--',c:mrVal?'38BDF8':MUT,fs:12},
          {l:'ENG. RATE',v:erVal?erVal.toFixed(1)+'%':'--',c:erVal?'FB923C':MUT,fs:12},
          {l:'EMV',v:fm(d.EMV),c:GN,fs:12},
          {l:'VISIT',v:travel==='--'?'--':travel,c:travel==='--'?MUT:'C084FC',fs:9}
        ];
      }
      var sW=(cardW-0.4)/3,sH=0.55;
      for(var si2=0;si2<stats.length;si2++){
        var sc2=si2%3,sr=Math.floor(si2/3);
        var sx=cx+0.2+sc2*sW,sy2=cy+1.0+sr*(sH+0.05);
        sl.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:sx,y:sy2,w:sW-0.05,h:sH,fill:{color:SF2},rectRadius:0.05});
        sl.addText(stats[si2].v,{x:sx,y:sy2+0.02,w:sW-0.05,h:0.3,fontSize:stats[si2].fs,fontFace:FN,bold:true,color:stats[si2].c,align:'center',valign:'middle'});
        sl.addText(stats[si2].l,{x:sx,y:sy2+0.3,w:sW-0.05,h:0.2,fontSize:6,fontFace:FN,color:MUT,align:'center',valign:'middle'});
      }

      // Tier badge
      if(d.Tier){
        var tw=d.Tier.length*0.06+0.15;
        sl.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:cx+cardW-tw-0.15,y:cy+0.2,w:tw,h:0.22,fill:{color:SF2},rectRadius:0.05});
        sl.addText(d.Tier,{x:cx+cardW-tw-0.15,y:cy+0.2,w:tw,h:0.22,fontSize:7,fontFace:FN,color:MUT,align:'center',valign:'middle'});
      }
    }
  }

  var modeSuffix=mode==='costs'?'_with_costs':'_without_costs';
  var fname='Influencer_Casting_'+(camps.length===1?camps[0].replace(/[^a-zA-Z0-9]/g,'_'):camps.length>1?'Multi':'All')+modeSuffix+'_'+dateStr.replace(/ /g,'_');
  try{
    await pptx.writeFile({fileName:fname});
  }catch(e){
    console.error('PPT export error:',e);
    alert('Export failed: '+e.message);
  }finally{
    if(btn){btn.innerHTML=origText;btn.disabled=false}
  }
}

</script>
</body>
</html>
